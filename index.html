<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Watch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <div id="header">
    <h1>File Watch</h1>
    <span id="status"></span>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button type="button" id="btn-add">+ Add</button>
    <button type="button" id="btn-remove">− Remove</button>
    <button type="button" id="btn-import-csv">Import CSV</button>
    <button type="button" id="btn-export-csv">Export CSV</button>
  </div>

  <!-- Mappings table -->
  <div id="table-container">
    <table id="mappings-table">
      <thead>
        <tr>
          <th scope="col"><input type="checkbox" id="chk-all" title="Select all" /></th>
          <th scope="col">Bin Path</th>
          <th scope="col">Drive Path</th>
          <th scope="col">Label</th>
          <th scope="col">Active</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody id="table-body">
      </tbody>
    </table>
  </div>

  <!-- Watch controls -->
  <div id="watch-controls">
    <button type="button" id="btn-sync" class="primary">Sync Now</button>
    <label title="Ignore last sync time and re-import all folders">
      <input type="checkbox" id="chk-force-sync" />
      Force
    </label>
    <label>
      <input type="checkbox" id="toggle-watch" />
      Auto-watch
    </label>
    <select id="interval-sel" title="Auto-watch interval" disabled>
      <option value="5000">5 sec</option>
      <option value="15000">15 sec</option>
      <option value="30000">30 sec</option>
      <option value="60000">1 min</option>
      <option value="300000" selected>5 min</option>
      <option value="600000">10 min</option>
    </select>
  </div>

  <!-- Log -->
  <div id="log-section">
    <div id="log-header">
      <span>Log</span>
      <button type="button" id="btn-clear-log">Clear</button>
    </div>
    <div id="log"></div>
  </div>

  <script src="js/CSInterface.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
